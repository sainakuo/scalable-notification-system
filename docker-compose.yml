version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: sns_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sns_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sns_redis
    ports:
      - "6379:6379"

  grpc-sender:
    build:
      context: .
      dockerfile: Dockerfile.grpc-sender
    container_name: sns_grpc_sender
    ports:
      - "50051:50051"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sns_api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sns_db
      REDIS_ADDR: redis:6379
      API_PORT: 8080
    depends_on:
      - postgres
      - redis
      - migrate

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: sns_worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sns_db
      REDIS_ADDR: redis:6379
      GRPC_SENDER_ADDR: grpc-sender:50051
    depends_on:
      - postgres
      - redis
      - grpc-sender
      - migrate

  migrate:
    image: postgres:16
    container_name: sns_migrate
    depends_on:
      - postgres
    volumes:
      - ./migrations:/migrations
    environment:
      PGPASSWORD: postgres
    command: >
      sh -c "until pg_isready -h postgres -U postgres -d sns_db;
      do echo waiting for postgres; sleep 2; done;
      psql -h postgres -U postgres -d sns_db -f /migrations/001_create_tasks_table.sql"

volumes:
  postgres_data: